name: Deploy Monitor to VPS

on:
  push:
    branches: [main, master]
    paths:
      - "monitor/**"
      - ".github/workflows/deploy-monitor.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Target architecture (e.g., x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu)"
        required: false
        default: "x86_64-unknown-linux-musl"
      debug:
        description: "Enable debug output"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  TARGET: ${{ github.event.inputs.target || 'x86_64-unknown-linux-musl' }}
  DEPLOY_PATH: /opt/jetstream-monitor
  SERVICE_NAME: jetstream-monitor
  BINARY_NAME: jetstream-monitor

jobs:
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: monitor/frontend/package-lock.json

      - name: Build frontend
        working-directory: monitor/frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: monitor/frontend/dist
          retention-days: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-bin

      - name: Install cross
        run: |
          if [ ! -f ~/.cargo/bin/cross ]; then
            cargo install cross --git https://github.com/cross-rs/cross
          fi

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "monitor -> target"

      - name: Build release binary
        working-directory: monitor
        run: cross build --release --target ${{ env.TARGET }}

      - name: Strip binary
        run: strip monitor/target/${{ env.TARGET }}/release/${{ env.BINARY_NAME }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-monitor-${{ env.TARGET }}
          path: monitor/target/${{ env.TARGET }}/release/${{ env.BINARY_NAME }}
          retention-days: 1

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-monitor-${{ env.TARGET }}

      - name: Debug - Binary artifact
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== Binary artifact contents ==="
          ls -laR binary-monitor-${{ env.TARGET }}/ 2>/dev/null || echo "Not found"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Debug - Frontend artifact
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== Frontend artifact contents ==="
          ls -laR frontend-dist/ 2>/dev/null || echo "Not found"

      - name: Debug - Before SCP frontend
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== Source for frontend SCP ==="
          ls -laR frontend-dist/ 2>/dev/null || echo "Not found"
          echo "=== Target path ==="
          echo "/tmp/${{ env.DEPLOY_PATH }}/frontend/"

      - name: Copy frontend dist to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          source: frontend-dist/
          target: "/tmp/${{ env.DEPLOY_PATH }}/frontend/"

      - name: Move frontend dist on Host
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo rm -rf ${{ env.DEPLOY_PATH }}/frontend
            sudo mv /tmp/${{ env.DEPLOY_PATH }}/frontend ${{ env.DEPLOY_PATH }}/frontend
            sudo chown -R ${{ env.SERVICE_NAME }}:${{ env.SERVICE_NAME }} ${{ env.DEPLOY_PATH }}/frontend

      - name: Create directories on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo mkdir -p ${{ env.DEPLOY_PATH }}/frontend
            sudo useradd -r -s /bin/false ${{ env.SERVICE_NAME }} 2>/dev/null || true
            sudo chown ${{ env.SERVICE_NAME }}:${{ env.SERVICE_NAME }} ${{ env.DEPLOY_PATH }}

      - name: Cleanup temp folder on Host
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo rm -rf /tmp/${{ env.DEPLOY_PATH }}

      - name: Debug - Before SCP binary
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== Source for binary SCP ==="
          ls -laR binary-monitor-${{ env.TARGET }}/ 2>/dev/null || echo "Not found"
          echo "=== Target path ==="
          echo "/tmp/${{ env.DEPLOY_PATH }}/"

      - name: Copy binary to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          source: binary-monitor-${{ env.TARGET }}/
          target: "/tmp/${{ env.DEPLOY_PATH }}/"

      - name: Update binary permissions on Host
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo mv /tmp/${{ env.DEPLOY_PATH }}/binary-monitor-${{ env.TARGET }}/${{ env.BINARY_NAME }} ${{ env.DEPLOY_PATH }}/${{ env.BINARY_NAME }}
            sudo chmod +x ${{ env.DEPLOY_PATH }}/${{ env.BINARY_NAME }}
            sudo chown ${{ env.SERVICE_NAME }}:${{ env.SERVICE_NAME }} ${{ env.DEPLOY_PATH }}/${{ env.BINARY_NAME }}

      - name: Debug - Before SCP systemd
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== Source for systemd SCP ==="
          ls -la monitor/deploy/systemd/${{ env.SERVICE_NAME }}.service 2>/dev/null || echo "Not found"
          echo "=== Target path ==="
          echo "/tmp/"

      - name: Copy systemd service file to Host
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          strip_components: 3
          source: monitor/deploy/systemd/${{ env.SERVICE_NAME }}.service
          target: "/tmp/"

      - name: Move systemd service file and reload via systemctl
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo mv /tmp/${{ env.SERVICE_NAME }}.service /etc/systemd/system/${{ env.SERVICE_NAME }}.service
            sudo systemctl daemon-reload

      - name: Check for .env file
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            if [ ! -f ${{ env.DEPLOY_PATH }}/.env ]; then
              echo '# Create .env file at ${{ env.DEPLOY_PATH }}/.env with your configuration'
              echo '# See monitor/.env.example for required variables'
              echo '# You will need to restart the service after updating the .env file.'
              echo '# sudo systemctl restart ${{ env.SERVICE_NAME }}'
            fi

      - name: Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo systemctl enable ${{ env.SERVICE_NAME }}
            sudo systemctl restart ${{ env.SERVICE_NAME }}

      - name: Debug - Before SCP Caddy script
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== Source for Caddy SCP ==="
          ls -la monitor/deploy/setup-caddy.sh 2>/dev/null || echo "Not found"
          echo "=== Target path ==="
          echo "/tmp/"

      - name: Copy Caddy setup script to Host
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          strip_components: 2
          source: monitor/deploy/setup-caddy.sh
          target: "/tmp/"

      - name: Execute Caddy setup script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sudo bash /tmp/setup-caddy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_MONITOR_HOST }}
          username: deploy
          key: ${{ secrets.VPS_MONITOR_SSH_KEY }}
          script: |
            sleep 3
            sudo systemctl status ${{ env.SERVICE_NAME }} --no-pager
            curl -sf http://localhost:8080/ || echo 'Health check failed - service may still be starting'
