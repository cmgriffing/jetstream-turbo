name: Benchmarks

on:
  push:
    branches: [main, master]
    paths:
      - 'rust/**'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'rust/**'

env:
  CARGO_TERM_COLOR: always
  REGRESSION_THRESHOLD: 2.0

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout main baseline source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: main-baseline

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        working-directory: main-baseline/rust
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/main-baseline/rust/target
        run: |
          cargo bench --bench hydration_benchmark

      - name: Run benchmarks (candidate)
        working-directory: rust
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
        run: |
          cargo bench --bench hydration_benchmark

      - name: Compare with baseline
        id: compare
        working-directory: rust
        run: |
          chmod +x scripts/benchmarks/check.sh
          BASELINE_DIR="${{ github.workspace }}/main-baseline/rust/target/criterion" \
          BENCHMARK_OUTPUT="${{ github.workspace }}/rust/target/criterion" \
          REGRESSION_THRESHOLD="${{ env.REGRESSION_THRESHOLD }}" \
          scripts/benchmarks/check.sh 2>&1 | tee compare_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post regression comment on PR
        if: github.event_name == 'pull_request' && steps.compare.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            
            let comment = '## ⚠️ Benchmark Regression Detected\n\n';
            comment += 'The following benchmarks have regressed beyond the ' + process.env.REGRESSION_THRESHOLD + '% threshold:\n\n';
            
            // Try to get detailed comparison
            try {
              const output = fs.readFileSync('./rust/compare_output.txt', 'utf8');
              const lines = output.split('\n').filter(l => l.includes('[REGRESSION]'));
              for (const line of lines) {
                comment += '- ' + line.replace('[REGRESSION]', '').trim() + '\n';
              }
            } catch (e) {}
            
            comment += '\n**Action Required:**\n';
            comment += '- If this is intentional, include rationale in the PR description and expected impact\n';
            comment += '- If unintended, please investigate and fix the performance regression\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail on regression
        if: steps.compare.outcome == 'failure'
        run: exit 1
