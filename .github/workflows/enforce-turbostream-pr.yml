name: Enforce Turbostream PR Policy

on:
  push:
    branches: [main, master]
    paths:
      - 'rust/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  require-pr-for-rust-changes:
    name: Require PR for turbostream changes
    runs-on: ubuntu-latest
    steps:
      - name: Verify commits are associated with PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commits = (context.payload.commits || []).map((c) => c.id);

            if (commits.length === 0) {
              core.info('No commits found in push payload. Nothing to validate.');
              return;
            }

            const missingPr = [];

            for (const sha of commits) {
              const prs = await github.paginate(
                github.rest.repos.listPullRequestsAssociatedWithCommit,
                {
                  owner,
                  repo,
                  commit_sha: sha,
                }
              );

              if (prs.length === 0) {
                missingPr.push(sha);
              }
            }

            if (missingPr.length > 0) {
              core.setFailed(
                [
                  'Direct push to main/master touched turbostream paths (rust/**) without an associated PR.',
                  'All turbostream changes must come from a separate branch and pull request.',
                  `Commits without PR association: ${missingPr.join(', ')}`,
                ].join('\n')
              );
            } else {
              core.info('All commits are associated with PRs.');
            }
